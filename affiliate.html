<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代理店バックオフィス | 暗号資産入門ラボ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=DM+Mono:wght@400;500&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c26;
  --border:#2a2a3a;
  --accent:#f7931a;
  --accent2:#ffb347;
  --text:#f0f0f0;
  --muted:#8888aa;
  --green:#22c55e;
  --red:#ef4444;
  --mono:'DM Mono',monospace;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

/* ── ヘッダー ── */
.header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.logo{font-size:14px;font-weight:900;color:var(--accent);letter-spacing:.1em;font-family:var(--mono)}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:12px;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:'Noto Sans JP',sans-serif}
.logout-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── ログイン画面 ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;max-width:400px;width:100%;text-align:center}
.login-icon{font-size:48px;margin-bottom:16px}
.login-title{font-size:22px;font-weight:900;margin-bottom:6px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.code-input{width:100%;padding:14px 16px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:18px;font-family:var(--mono);letter-spacing:.15em;text-align:center;text-transform:uppercase;outline:none;transition:border-color .15s}
.code-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#e07010);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:900;cursor:pointer;margin-top:12px;font-family:'Noto Sans JP',sans-serif;transition:opacity .15s}
.login-btn:hover{opacity:.9}
.login-btn:disabled{opacity:.4;cursor:not-allowed}
.login-err{color:var(--red);font-size:13px;margin-top:10px;display:none}

/* ── ダッシュボード ── */
#dashboard{display:none;max-width:900px;margin:0 auto;padding:28px 20px 80px}
.welcome{font-size:13px;color:var(--muted);margin-bottom:24px}
.welcome strong{color:var(--accent)}

/* ── 統計カード ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
@media(max-width:600px){.stats-grid{grid-template-columns:1fr 1fr}}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 18px}
.stat-label{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.stat-val{font-size:28px;font-weight:900;font-family:var(--mono)}
.stat-val.orange{color:var(--accent)}
.stat-val.green{color:var(--green)}
.stat-val.white{color:var(--text)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px}

/* ── 紹介URL ── */
.url-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:28px}
.url-label{font-size:12px;color:var(--muted);font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
.url-box{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px}
.url-text{flex:1;font-size:13px;font-family:var(--mono);color:var(--accent2);word-break:break-all}
.copy-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);font-size:12px;padding:6px 14px;border-radius:6px;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;transition:background .15s}
.copy-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── メンバーテーブル ── */
.section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.members-table{width:100%;border-collapse:collapse}
.members-table th{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
.members-table td{padding:14px 12px;border-bottom:1px solid var(--border);font-size:13px}
.members-table tr:last-child td{border-bottom:none}
.members-table tr:hover td{background:rgba(247,147,26,.04)}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;font-family:var(--mono)}
.badge-active{background:rgba(34,197,94,.15);color:var(--green)}
.badge-inactive{background:rgba(239,68,68,.12);color:var(--red)}
.badge-monthly{background:rgba(247,147,26,.12);color:var(--accent)}
.badge-yearly{background:rgba(99,102,241,.15);color:#818cf8}
.badge-paid{background:rgba(34,197,94,.12);color:var(--green)}
.badge-unpaid{background:rgba(239,68,68,.1);color:var(--red)}
.empty-state{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}

/* ── ローディング ── */
.loading{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── トースト ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:9999}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="loginScreen">
  <div class="login-card">
    <div class="login-icon">🪙</div>
    <div class="login-title">代理店バックオフィス</div>
    <div class="login-sub">暗号資産入門ラボ パートナー専用</div>
    <input class="code-input" id="codeInput" type="text" placeholder="代理店コードを入力" maxlength="20"
      onkeydown="if(event.key==='Enter')doLogin()" autocomplete="off" spellcheck="false">
    <button class="login-btn" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- ダッシュボード -->
<div id="dashboardWrap" style="display:none">
  <div class="header">
    <div class="logo">暗号資産入門ラボ｜PARTNER</div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div id="dashboard">
    <div class="loading"><span class="spinner"></span>読み込み中...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const WORKER_URL = 'https://cryptolab-stripe.laughrally.workers.dev';
const STORAGE_KEY = 'cryptolab_affiliate_code';
let affiliateData = null;

// ── ログイン ──────────────────────────────────────────────────────────────
async function doLogin() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('loginErr');
  if (!code) { showErr('コードを入力してください'); return; }
  btn.disabled = true; btn.textContent = '認証中...';
  err.style.display = 'none';
  try {
    const res = await fetch(WORKER_URL + '/api/affiliate/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    const data = await res.json();
    if (!res.ok || !data.ok) {
      showErr(data.error || 'ログインに失敗しました');
      btn.disabled = false; btn.textContent = 'ログイン';
      return;
    }
    localStorage.setItem(STORAGE_KEY, code);
    affiliateData = data;
    showDashboard(data);
  } catch(e) {
    showErr('通信エラーが発生しました');
    btn.disabled = false; btn.textContent = 'ログイン';
  }
}

function showErr(msg) {
  const err = document.getElementById('loginErr');
  err.textContent = msg; err.style.display = 'block';
}

function doLogout() {
  localStorage.removeItem(STORAGE_KEY);
  affiliateData = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboardWrap').style.display = 'none';
  document.getElementById('codeInput').value = '';
  document.getElementById('loginBtn').disabled = false;
  document.getElementById('loginBtn').textContent = 'ログイン';
}

// ── ダッシュボード描画 ────────────────────────────────────────────────────
function showDashboard(data) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboardWrap').style.display = 'block';

  const { affiliate, members } = data;
  const refUrl = `https://laughrally.github.io/cryptolab/?ref=${affiliate.code}`;

  // メンバーテーブル
  const memberRows = members.length === 0
    ? `<tr><td colspan="5" class="empty-state">まだ紹介した会員がいません</td></tr>`
    : members.map(m => {
        const joinDate = new Date(m.joined_at).toLocaleDateString('ja-JP', { year:'numeric', month:'short', day:'numeric' });
        const statusBadge = m.status === 'active'
          ? '<span class="badge badge-active">● アクティブ</span>'
          : '<span class="badge badge-inactive">● 停止</span>';
        const planBadge = m.plan === 'yearly'
          ? '<span class="badge badge-yearly">年額</span>'
          : '<span class="badge badge-monthly">月額</span>';
        const paidBadge = m.paid
          ? '<span class="badge badge-paid">支払済</span>'
          : '<span class="badge badge-unpaid">未払い</span>';
        return `<tr>
          <td style="font-family:var(--mono);font-size:12px;color:var(--muted)">${m.email}</td>
          <td>${planBadge}</td>
          <td>${statusBadge}</td>
          <td style="font-family:var(--mono);color:var(--accent)">¥${m.reward.toLocaleString()}</td>
          <td>${paidBadge}</td>
        </tr>`;
      }).join('');

  document.getElementById('dashboard').innerHTML = `
    <div class="welcome">ようこそ、<strong>${affiliate.name}</strong> さん ／ コード: <span style="font-family:var(--mono)">${affiliate.code}</span></div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">累計紹介人数</div>
        <div class="stat-val white">${affiliate.total_referrals}<span style="font-size:14px;color:var(--muted)"> 人</span></div>
        <div class="stat-sub">有料会員のみカウント</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">累計報酬額</div>
        <div class="stat-val orange">¥${(affiliate.total_reward || 0).toLocaleString()}</div>
        <div class="stat-sub">月額¥1,980 / 年額¥20,000</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">未払い報酬</div>
        <div class="stat-val green">¥${(affiliate.unpaid_reward || 0).toLocaleString()}</div>
        <div class="stat-sub">月末締め・翌10日払い</div>
      </div>
    </div>

    <div class="url-section">
      <div class="url-label">あなたの紹介URL</div>
      <div class="url-box">
        <div class="url-text">${refUrl}</div>
        <button class="copy-btn" onclick="copyUrl('${refUrl}')">コピー</button>
      </div>
    </div>

    <div class="section-title">👥 紹介メンバー一覧</div>
    <div style="overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:14px">
      <table class="members-table">
        <thead>
          <tr>
            <th>メールアドレス</th>
            <th>プラン</th>
            <th>状態</th>
            <th>報酬</th>
            <th>支払い</th>
          </tr>
        </thead>
        <tbody>${memberRows}</tbody>
      </table>
    </div>
  `;
}

function copyUrl(url) {
  navigator.clipboard.writeText(url).then(() => showToast('URLをコピーしました！'));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ── 自動ログイン（コード保存済みの場合） ─────────────────────────────────
(async function() {
  const savedCode = localStorage.getItem(STORAGE_KEY);
  if (savedCode) {
    document.getElementById('codeInput').value = savedCode;
    doLogin();
  }
})();
</script>
</body>
</html>
